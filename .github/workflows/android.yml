name: Android APK

# Builds a sideloadable Android APK from the Expo app in mobile/.
# Fully self-contained: `expo prebuild` generates the native android/ project,
# then Gradle assembles a release APK signed with the generated debug keystore
# (fine for personal sideloading — no keystore secrets required). Each build is
# published to the rolling "android-latest" GitHub Release (permanent install
# link) and also uploaded as a workflow artifact.

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/android.yml"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Needed so the build can publish the APK to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Provides the Android SDK + accepts licenses so AGP can auto-download
      # the compileSdk platform / build-tools the RN build needs.
      - uses: android-actions/setup-android@v3

      # Caches ~/.gradle (dependencies + wrapper dists) and wires up the Gradle
      # build cache across runs, so builds after the first are warm.
      - uses: gradle/actions/setup-gradle@v4

      - name: Install JS dependencies
        run: npm ci

      - name: Generate native android/ project (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      # Build overrides passed on the command line (they beat the regenerated
      # gradle.properties, so they survive every `expo prebuild`):
      #  - reactNativeArchitectures=arm64-v8a → compile native libs + Hermes once
      #    instead of ×4 ABIs (biggest time saver; also a smaller APK). Runs on
      #    64-bit phones only — fine for personal sideloading.
      #  - --parallel --build-cache → use both cores + reuse cached task outputs.
      #  - PNG crunch off → minor win; the app ships few PNGs.
      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --parallel --build-cache \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.enablePngCrunchInReleaseBuilds=false

      # Stable, human-readable name so the Release download URL never changes.
      # Also surface the app version for the Release notes. Run from the repo root
      # (the job default working-directory is mobile/) so paths are unambiguous.
      - name: Rename APK
        working-directory: ${{ github.workspace }}
        run: |
          cp mobile/android/app/build/outputs/apk/release/app-release.apk moverse.apk
          echo "APP_VERSION=$(node -p "require('./mobile/app.json').expo.version")" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moverse-android-apk
          path: moverse.apk
          if-no-files-found: error

      # Publish to a rolling "android-latest" pre-release so the phone can install
      # straight from a permanent link:
      #   https://github.com/<owner>/moverse/releases/download/android-latest/moverse.apk
      # The asset is replaced each build; the URL stays the same.
      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android APK (latest)
          body: |
            Latest sideloadable Android build (debug-signed, for personal testing).
            App version ${{ env.APP_VERSION }} · commit ${{ github.sha }}.
            Install: download moverse.apk on your phone, allow "install unknown apps", tap to install.
          prerelease: true
          make_latest: false
          files: moverse.apk
